name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # allow a manual build without tagging

# Minimal default token; jobs elevate only what they need.
permissions:
  contents: read

jobs:
  # ───────────────────────────── Windows ─────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write       # OIDC for provenance attestation
      attestations: write   # write the attestation
    env:
      SIGN_ENABLED: ${{ secrets.AZURE_TENANT_ID != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Install build deps
        run: pip install pyinstaller openpyxl==3.1.5 et_xmlfile==2.0.0
      - name: Build (PyInstaller)
        run: pyinstaller packaging/foxentry.spec --clean

      - name: Sign (Azure Trusted Signing)
        if: env.SIGN_ENABLED == 'true'
        uses: azure/trusted-signing-action@v0.5.9
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Verify signature
        if: env.SIGN_ENABLED == 'true'
        shell: pwsh
        run: |
          $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                Where-Object { $_.FullName -match 'x64' } | Select-Object -First 1
          & $st.FullName verify /pa /v dist\FoxentryDataCleaner.exe

      - name: Checksums
        shell: pwsh
        run: |
          cd dist
          (Get-FileHash FoxentryDataCleaner.exe -Algorithm SHA256).Hash + "  FoxentryDataCleaner.exe" |
            Out-File -Encoding ascii FoxentryDataCleaner.exe.sha256
      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with: { subject-path: dist/FoxentryDataCleaner.exe }
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/FoxentryDataCleaner.exe
            dist/FoxentryDataCleaner.exe.sha256
      - name: Upload artifact (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with: { name: FoxentryDataCleaner-windows, path: "dist/FoxentryDataCleaner.exe*" }

  # ───────────────────────────── macOS ─────────────────────────────
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write       # OIDC for provenance attestation
      attestations: write   # write the attestation
    env:
      SIGN_ENABLED: ${{ secrets.APPLE_DEVELOPER_ID != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Install build deps
        run: pip install pyinstaller openpyxl==3.1.5 et_xmlfile==2.0.0
      - name: Build (PyInstaller)
        run: pyinstaller packaging/foxentry.spec --clean
      - name: Rename
        run: mv dist/FoxentryDataCleaner dist/FoxentryDataCleaner-macos && chmod +x dist/FoxentryDataCleaner-macos

      # Code signing + notarization with an Apple Developer ID (runs when the Apple secrets are present).
      - name: Sign & notarize (Apple Developer ID)
        if: env.SIGN_ENABLED == 'true'
        env:
          CERT_P12: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PWD: ${{ secrets.APPLE_CERT_PASSWORD }}
          DEV_ID:   ${{ secrets.APPLE_DEVELOPER_ID }}
          AC_ID:    ${{ secrets.APPLE_ID }}
          AC_PWD:   ${{ secrets.APPLE_APP_PASSWORD }}
          AC_TEAM:  ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci build.keychain
          codesign --force --options runtime --timestamp -s "$DEV_ID" dist/FoxentryDataCleaner-macos
          ditto -c -k --keepParent dist/FoxentryDataCleaner-macos notarize.zip
          xcrun notarytool submit notarize.zip --apple-id "$AC_ID" --password "$AC_PWD" --team-id "$AC_TEAM" --wait
          # (onefile binary cannot be stapled; notarization is verified online by Gatekeeper)
          codesign --verify --verbose dist/FoxentryDataCleaner-macos

      - name: Checksums
        run: cd dist && shasum -a 256 FoxentryDataCleaner-macos > FoxentryDataCleaner-macos.sha256
      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with: { subject-path: dist/FoxentryDataCleaner-macos }
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/FoxentryDataCleaner-macos
            dist/FoxentryDataCleaner-macos.sha256
      - name: Upload artifact (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with: { name: FoxentryDataCleaner-macos, path: "dist/FoxentryDataCleaner-macos*" }

  # ───────────────────────────── Linux ─────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write       # OIDC for provenance attestation
      attestations: write   # write the attestation
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Install build deps
        run: pip install pyinstaller openpyxl==3.1.5 et_xmlfile==2.0.0
      - name: Build (PyInstaller)
        run: pyinstaller packaging/foxentry.spec --clean
      - name: Rename
        run: mv dist/FoxentryDataCleaner dist/FoxentryDataCleaner-linux && chmod +x dist/FoxentryDataCleaner-linux
      - name: Checksums
        run: cd dist && sha256sum FoxentryDataCleaner-linux > FoxentryDataCleaner-linux.sha256
      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with: { subject-path: dist/FoxentryDataCleaner-linux }
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/FoxentryDataCleaner-linux
            dist/FoxentryDataCleaner-linux.sha256
      - name: Upload artifact (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with: { name: FoxentryDataCleaner-linux, path: "dist/FoxentryDataCleaner-linux*" }
