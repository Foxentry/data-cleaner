<script>
  // Session token for the local API (against CSRF/DNS rebinding). Adds X-Auth to all /api/ calls.
  (function(){ var m=document.querySelector('meta[name=x-auth]'); var AUTH=m?m.content:'';
    var _f=window.fetch.bind(window);
    window.fetch=function(u,o){ o=o||{};
      if(typeof u==='string' && u.indexOf('/api/')===0){
        o.headers=Object.assign({}, o.headers||{}, {'X-Auth':AUTH}); }
      return _f(u,o); };
  })();
</script>
<style>
  :root{
    --fox:#f54009; --fox-d:#ba2a09; --violet:#422c63; --blue:#2c83ee; --blue-l:#ebf4ff;
    --green:#4ebf3c; --ink:#131313; --grey:#8588a1; --grey-l:#a1a2ae; --grey-ll:#bbbcc3;
    --divider:#d9dae2; --bg:#ffffff; --card:#fff; --surface-2:#f5f6f9; --chip:#fff2ee; --pill:#f1f1f1; --err:#d82400;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Mulish",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;font-size:15px}
  /* controls inherit font and color (otherwise the browser renders them with the system font) */
  button,input,select,textarea,optgroup{font-family:inherit;color:var(--ink)}
  a{color:var(--fox)}
  /* header */
  header{background:var(--card);border-bottom:1px solid var(--divider);position:sticky;top:0;z-index:20}
  .bar{margin:0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1.2rem;padding:.75rem 1.6rem}
  .brand{display:flex;align-items:center;gap:.55rem;font-weight:700;font-size:1rem;color:var(--ink);justify-self:start;text-decoration:none}
  .logo{height:26px;width:auto;flex:0 0 auto}
  .brandmark{font-weight:800;font-size:1.18rem;color:var(--fox);letter-spacing:-.02em;line-height:1}
  .steps{display:flex;align-items:center;gap:.1rem;justify-self:center;flex-wrap:nowrap}
  .step{display:flex;align-items:center;gap:.55rem;color:#808189;font-size:.9rem;padding:.2rem .35rem;white-space:nowrap;font-weight:700}
  .step .n{width:2rem;height:2rem;border-radius:50%;border:2px solid var(--divider);display:grid;place-items:center;font-size:.85rem;font-weight:700;background:var(--card);color:#808189;flex:0 0 auto}
  .step.active{color:var(--ink)}
  .step.active .n{border-color:var(--blue);background:var(--card);color:var(--blue)}
  .step.done{color:var(--ink)}
  .step.done .n{border-color:#f1f7ff;background:#f1f7ff;color:var(--blue)}
  .step .ln{flex:1;min-width:18px;height:2px;background:var(--divider)}
  .top-actions{display:flex;gap:.5rem;align-items:center;justify-self:end}
  .lang{display:flex;border:1px solid var(--divider);border-radius:6px;overflow:hidden}
  .lang button{border:0;background:var(--card);color:var(--grey);padding:.32rem .62rem;cursor:pointer;font-size:.8rem;font-weight:700}
  .lang button.active{background:var(--blue);color:#fff}
  .icon-btn{border:1px solid var(--divider);background:var(--card);border-radius:6px;padding:.36rem .56rem;cursor:pointer;font-size:.9rem;color:var(--grey)}
  .icon-btn:hover{color:var(--ink)}
  main{margin:0;padding:1.6rem 1.6rem 5rem}
  h1{font-size:1.5rem;margin:0 0 .3rem;font-weight:700}
  .lead{color:var(--grey);margin:0 0 1.4rem}
  h2{font-size:1rem;margin:1.4rem 0 .6rem;font-weight:700}
  .muted{color:var(--grey)} .small{font-size:.85rem}
  /* buttons */
  .btn{display:inline-block;padding:.85rem 1.6rem;background:var(--fox);border:1px solid var(--fox);border-radius:5px;
    box-shadow:2px 5px 6px 1px rgba(0,0,0,.12);color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;line-height:1}
  .btn:hover:not(:disabled){background:var(--fox-d);border-color:var(--fox-d)}
  .btn:disabled{background:var(--grey-ll);border-color:var(--grey-ll);color:#fff;cursor:default;box-shadow:none;opacity:1}
  .btn--sm{padding:.28rem .7rem;font-size:.82rem;margin-left:.5rem}
  .btn--start{box-shadow:0 6px 18px rgba(245,64,9,.28)}
  .btn--start:not(:disabled):hover{box-shadow:0 8px 22px rgba(245,64,9,.36)}
  .btn--start .play{display:inline-block;margin-right:.5rem;font-size:.85em;transform:translateY(-1px)}
  .btn--ghost{background:var(--card);color:var(--grey);border:2px solid var(--divider);box-shadow:none;padding:.8rem 1.4rem;cursor:pointer}
  .btn--ghost:hover{background:var(--card);border-color:var(--grey-l);color:var(--ink)}
  .btn,.btn--ghost{transition:background .15s,border-color .15s,color .15s}
  /* hover/pointer for everything clickable */
  .step.done{cursor:pointer}
  .step.done:hover .n{border-color:var(--blue);color:var(--blue)}
  .lang button{transition:background .15s,color .15s}
  .lang button:hover:not(.active){background:var(--surface-2);color:var(--ink)}
  .icon-btn{transition:color .15s,border-color .15s}
  .icon-btn:hover{border-color:var(--grey-l)}
  .fileitem{transition:border-color .15s,background .15s}
  .chip{transition:border-color .15s,box-shadow .15s}
  .chip:hover{border-color:var(--fox)}
  .chip.empty:hover{border-color:var(--grey-l);background:var(--card)}
  .scope label{transition:border-color .15s}
  .scope label:hover{border-color:var(--grey-l)}
  .gsel{transition:border-color .15s}
  .gsel:hover{border-color:var(--fox)}
  .sheetarrow{transition:color .15s,border-color .15s}
  .dl{cursor:pointer}.dl:hover{text-decoration:underline}
  a{cursor:pointer}
  /* rounded white panel under the columns table */
  .sheetpanel{background:var(--card);border:1px solid var(--divider);border-radius:12px;padding:.3rem;overflow:hidden}
  /* card / filter */
  .card{background:var(--card);border:1px solid var(--divider);border-radius:10px;padding:1.2rem 1.3rem;margin-bottom:1rem}
  .filter{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1rem;
    padding:0 0 .9rem;margin-bottom:1.3rem;border-bottom:1px solid var(--divider)}
  .filter__left{display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap}
  .filter__mark{font-size:1rem} .filter__mark strong{font-weight:700}
  .filter__sum{display:flex;align-items:center;gap:.4rem;color:var(--grey-l);font-weight:700;font-size:.8rem}
  .filter__sum mark{padding:.18rem .6rem;background:var(--pill);border-radius:3px;color:var(--ink)}
  /* first-row switch */
  .switchline{display:flex;align-items:center;gap:.55rem;color:var(--blue);font-weight:700;font-size:.85rem;cursor:pointer}
  .switch{position:relative;display:inline-block;width:38px;height:18px;flex:0 0 auto}
  .switch input{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;margin:0}
  .switch .h{position:absolute;inset:0;background:var(--grey);border-radius:9px;transition:background .25s}
  .switch .h:before{content:"";position:absolute;top:1px;left:1px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .25s}
  .switch input:checked + .h{background:var(--blue)} .switch input:checked + .h:before{left:21px}
  /* columns spreadsheet (mirrors the Foxentry app) */
  .sheetbox{position:relative}
  .sheetwrap{overflow-x:auto;padding:.2rem .1rem .6rem;margin-bottom:.4rem;cursor:grab;
    scrollbar-width:none;-ms-overflow-style:none}
  .sheetwrap::-webkit-scrollbar{display:none}
  .sheetwrap.drag{cursor:grabbing;user-select:none}
  .sheetarrow{position:absolute;top:50%;transform:translateY(-50%);z-index:6;width:42px;height:42px;border-radius:50%;
    border:1px solid var(--divider);background:var(--card);color:var(--grey);cursor:pointer;display:grid;place-items:center;
    box-shadow:0 4px 16px rgba(0,0,0,.08);font-size:1.2rem;line-height:1}
  .sheetarrow:hover{color:var(--fox);border-color:var(--fox)}
  .sheetarrow--l{left:-8px} .sheetarrow--r{right:-8px}
  .sheetarrow[disabled]{opacity:.3;cursor:default;color:var(--grey-ll);border-color:var(--divider)}
  .sheet{display:flex;width:100%;position:relative;align-items:stretch}
  .gut{flex:0 0 auto;width:150px}
  .col{flex:1 1 240px;min-width:210px;max-width:360px;border-left:1px solid var(--divider);border-radius:8px}
  .col:last-of-type{border-right:1px solid var(--divider)}
  .col.mapped{box-shadow:inset 0 0 0 2px var(--c)}
  .chiprow{height:64px;display:flex;align-items:center;padding:.5rem;border-bottom:1px solid var(--divider);background:var(--card)}
  .letter{height:22px;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--grey-l);background:var(--surface-2);border-bottom:1px solid var(--divider)}
  .rowh{height:38px;display:flex;align-items:center;padding:0 .75rem;font-size:.85rem;border-bottom:1px solid var(--divider);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--card)}
  .col .rowh.celldata,.col .rowh.cellhdr{display:block;line-height:38px}
  .cellhdr{font-weight:700}
  .celldata{color:var(--grey)}
  .celldata.empty{color:var(--grey-ll);font-style:italic}
  .grouprow{height:54px;display:flex;align-items:center;padding:.5rem}
  .gut .chiprow{justify-content:flex-start;gap:.45rem;font-weight:700;font-size:.85rem;color:var(--ink)}
  .gut .chiprow img{height:20px;opacity:.95}
  .gut .letter{background:var(--surface-2)}
  .gut .rowh{justify-content:flex-end;color:var(--grey-l);font-size:.75rem;background:var(--surface-2)}
  .firstrow{display:flex;align-items:center;gap:.45rem;font-size:.75rem;color:var(--blue);cursor:pointer;font-weight:700}
  .firstrow input{margin:0;accent-color:var(--blue)}
  /* per-column select header (admin db__option look) */
  .chip{display:flex;align-items:center;gap:.5rem;width:100%;min-height:46px;position:relative;
    border:1px solid var(--c,var(--divider));border-radius:8px;padding:.55rem .75rem;background:var(--card);
    cursor:pointer;font-size:.85rem;font-weight:700;color:var(--ink);box-shadow:0 1px 2px rgba(143,160,188,.2)}
  .chip:not(.empty){background:var(--chip);border-width:1.5px}
  .chip.empty{color:var(--grey);background:var(--surface-2);justify-content:flex-start;padding-right:1.9rem}
  .chip.empty:after{content:"";position:absolute;right:.9rem;top:50%;width:7px;height:7px;
    border-right:2px solid var(--grey-l);border-bottom:2px solid var(--grey-l);transform:translateY(-65%) rotate(45deg)}
  .chip .x{margin-left:auto;border:0;background:transparent;color:var(--grey-l);cursor:pointer;font-size:.9rem;line-height:1;padding:0 .1rem}
  .chip .x:hover{color:var(--fox)}
  .foxdot{width:16px;height:16px;flex:0 0 auto}
  .gsel{width:100%;border:1.5px solid var(--c,var(--divider));border-radius:7px;padding:.35rem 1.4rem .35rem .45rem;font-size:.8rem;background:var(--card);color:var(--ink);font-weight:700;cursor:pointer;text-overflow:ellipsis;overflow:hidden}
  /* legend */
  .legend{font-size:.8rem;color:var(--green);margin:.15rem 0}
  .legend b{color:var(--ink)}
  /* picker popover */
  .picker{position:absolute;z-index:90;background:var(--card);border:1px solid var(--divider);border-radius:10px;
    box-shadow:6px 9px 32px rgba(43,43,43,.18);min-width:268px;max-width:320px;max-height:380px;overflow:auto;padding:.35rem}
  .picker .grp{display:inline-block;font-size:.75rem;color:var(--blue);background:#f1f7ff;border-radius:5px;padding:.13rem .55rem;margin:.4rem .25rem .15rem;letter-spacing:.02em;font-weight:700}
  .picker .grp--sug{color:#9a6b00;background:#fff7e6}
  .picker .opt--sug{font-weight:600}
  .picker .opt--sug:hover{background:#fff7e6}
  .picker .opt{padding:.4rem .6rem;border-radius:6px;cursor:pointer;font-size:.85rem;line-height:1.3}
  .picker .opt:hover{background:var(--blue-l)}
  .picker .opt .opt-ex{display:block;font-size:.75rem;color:var(--grey);font-weight:400;margin-top:.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .picker .opt .opt-desc{display:block;font-size:.75rem;color:var(--blue);font-weight:400;margin-top:.05rem}
  /* settings */
  .sec{border:1px solid var(--divider);border-radius:12px;padding:0 1.1rem 1rem;margin-bottom:1rem;background:var(--card)}
  .sec-head{display:flex;align-items:center;flex-wrap:wrap;gap:.5rem .75rem;padding:1rem 0}
  .sec-icon{width:34px;height:34px;border-radius:9px;background:var(--chip);color:var(--fox);display:grid;place-items:center;flex:none}
  .sec-icon svg{width:19px;height:19px}
  .sec-title{font-size:1.08rem;font-weight:700;letter-spacing:-.01em}
  .sec-pill{margin-left:auto;font-size:.75rem;color:var(--grey);background:var(--surface-2);border:1px solid var(--divider);border-radius:999px;padding:.12rem .6rem;font-weight:700;white-space:nowrap}
  .sec-warn{margin-left:auto;display:inline-flex;align-items:center;gap:.4rem;font-size:.75rem;font-weight:600;line-height:1.35;color:#9a3412;background:#fff7ed;border:1px solid #fed7aa;border-radius:7px;padding:.22rem .6rem}
  .sets{display:flex;flex-direction:column}
  .set{display:flex;align-items:center;gap:1rem;padding:.75rem 0;border-top:1px solid var(--divider)}
  .set-l{flex:1;min-width:0}
  .set-name{font-size:.9rem;font-weight:600}
  .set-hint{font-size:.8rem;color:var(--grey);margin-top:.15rem;line-height:1.4}
  .set-c{flex:none;display:flex;align-items:center}
  .set--block{flex-direction:column;align-items:stretch}
  .set-select{min-width:200px;max-width:240px;border:1px solid var(--divider);border-radius:7px;padding:.5rem .65rem;font-size:.9rem;background:var(--card);color:var(--ink);cursor:pointer}
  .set-select:focus{outline:none;border-color:var(--fox)}
  .orderlist{margin-top:.6rem;display:flex;flex-direction:column;gap:.15rem;max-width:340px}
  .ord-item{display:flex;align-items:center;gap:.55rem;border:none;border-radius:7px;padding:.34rem .4rem;background:transparent}
  .ord-item:not(:last-child){border-bottom:1px solid var(--divider)}
  .ord-rank{width:1.3rem;height:1.3rem;border-radius:50%;background:var(--blue-l);color:var(--blue);display:grid;place-items:center;font-size:.72rem;font-weight:700;flex:none}
  .ord-name{flex:1;font-size:.85rem;color:var(--ink)}
  .ord-btns{display:inline-flex;gap:.2rem}
  .ord-btns button{border:1px solid var(--divider);background:var(--card);border-radius:5px;width:1.6rem;height:1.6rem;cursor:pointer;font-size:.65rem;color:var(--grey);line-height:1;transition:border-color .12s,color .12s}
  .ord-btns button:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
  .ord-btns button:disabled{opacity:.3;cursor:default}
  @media(max-width:560px){.set{flex-direction:column;align-items:stretch;gap:.4rem}.set-c{justify-content:flex-start}.set-select{max-width:none;width:100%}}
  /* summary / sum panel */
  .grid2{display:grid;grid-template-columns:1fr;gap:1rem}
  @media(min-width:820px){.grid2{grid-template-columns:1.1fr .9fr}}
  .field{margin-bottom:.9rem} .field label{display:block;font-size:.85rem;margin-bottom:.3rem;color:var(--grey)}
  input[type=text],input[type=password],input[type=number],select.std{width:100%;border:1px solid var(--divider);border-radius:6px;
    padding:.6rem .75rem;font-size:.9rem;background:var(--card);color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--fox)}
  .scope{display:flex;flex-direction:column;gap:.6rem;margin:.2rem 0 1rem}
  .scope label{border:1.5px solid var(--divider);border-radius:8px;padding:.75rem .9rem;cursor:pointer;display:flex;gap:.5rem;align-items:center}
  .scope label.sel{border-color:var(--fox);background:var(--chip)}
  .sum{background:var(--surface-2);border:1px solid var(--divider);border-radius:10px;padding:1.2rem 1.3rem;transition:opacity .15s}
  .sum__head{font-weight:700;margin-bottom:.4rem}
  .sum table{width:100%;border-collapse:collapse}
  .sum td{padding:.5rem .2rem;vertical-align:top;border:0;font-size:.9rem}
  .sum td:last-child{text-align:right;font-weight:700}
  .sum td small{display:block;color:var(--grey-l);font-weight:400;font-size:.75rem}
  .sum .divider td{padding:0} .sum .divider hr{border:0;border-top:1px solid var(--divider);margin:.5rem 0}
  .sum .total td{font-size:1.3rem;padding-top:.75rem}
  .sum .total td i{font-style:normal;font-weight:400;font-size:.85rem;color:var(--grey)}
  /* misc boxes */
  .progress{height:14px;background:var(--surface-2);border-radius:999px;overflow:hidden;margin:.6rem 0}
  .progress>div{height:100%;width:0;transition:width .45s ease;border-radius:999px;
    background-image:linear-gradient(90deg,var(--fox) 0%,#ff7a45 50%,var(--fox) 100%);
    background-size:40px 100%;animation:progmove 1s linear infinite}
  @keyframes progmove{0%{background-position:0 0}100%{background-position:40px 0}}
  @media(prefers-reduced-motion:reduce){.progress>div{animation:none}}
  .warnbox{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:8px;padding:.6rem .85rem;font-size:.85rem;margin:.5rem 0}
  .errbox{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:8px;padding:.6rem .85rem;font-size:.85rem;margin:.5rem 0}
  .okbox{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;border-radius:8px;padding:.6rem .85rem;font-size:.85rem;margin:.5rem 0}
  .donebox{display:flex;align-items:center;gap:.5rem;background:var(--card);border:1px solid var(--divider);border-radius:8px;padding:.6rem .85rem;font-size:.85rem;color:var(--ink);margin:.5rem 0}
  .donebox .dot{width:.55rem;height:.55rem;border-radius:50%;background:#3fb950;flex:none}
  .infoline{background:var(--blue-l);border:1px solid #cfe2fb;color:#1e40af;border-radius:8px;padding:.55rem .8rem;font-size:.85rem;margin:.2rem 0 1rem}
  .footer-actions{display:flex;justify-content:space-between;margin-top:1.5rem}

async function resumeRun(res){
  const m=document.getElementById("main");
  m.innerHTML=`<h1>${tr("title_sum")}</h1>`;
  const c=document.createElement("div");c.className="card";c.id="runcard";
  const done=(res&&res.done)||0, total=(res&&res.total)||0;
  const pct=total?Math.round(100*done/total):0;
  const banner=done>0?`<div class="okbox">${tr("prog_resumed",{n:done+1})}</div>`:"";
  c.innerHTML=`<div style="font-weight:600">${tr("running")}</div>
    <div class="progress"><div style="width:${Math.max(pct,2)}%"></div></div>
    ${banner}<div class="infobox">${tr("resume_note")}</div>`;
  m.appendChild(c);
  const d=await api("/api/run",{method:"POST",headers:{'Content-Type':'application/json'},
    body:JSON.stringify({file:state.file,mapping:mappedPayload(),settings:state.settings,scope:state.scope,limit:state.limit,hasHeader:state.hasHeaderRow,log:state.logRun})});
  if(!d.ok){ if((d.error||"").indexOf("running")>=0){pollRun();return;} go(3);return; }
  pollRun();
}

async function revalidate(fileEnc){
  const file=decodeURIComponent(fileEnc||"");
  try{await fetch("/api/reset",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({file})});}catch(e){}
  if(file&&state.files.includes(file)){await selectFile(file,true);go(1);}else{go(0);}
}

async function init(){
  const d=await api("/api/init");
  lang=d.lang||"en"; state.services=d.services; state.files=d.files;
  state.test_sample=d.test_sample; state.has_key=d.has_key; state.key_hint=d.key_hint; state.default_country=d.default_country;
  state.session=d.session||{files:{}};
  state.currency=d.currency||"CZK";
  state.allowPip=(d.allow_pip_install!==false);
  setupGlobalDrop();
  renderLang(); renderSteps();
  // resume an unfinished run - go straight to loading and continue
  const lf=state.session.last_file;
  if(d.resume && lf && state.files.includes(lf)){
    await selectFile(lf,true);
    if(d.resume.scope) state.scope=d.resume.scope;
    if(d.resume.limit) state.limit=d.resume.limit;
    state.step=3; renderSteps();
    if(d.resume.has_key){ resumeRun(d.resume); return; }
    render(); return;
  }
  // finished validation -> straight to the report + options (new file / re-validate)
  if(d.last_report && lf && state.files.includes(lf)){
    await selectFile(lf,true);
    state.file=lf; state.step=3; renderSteps();
    renderReport(d.last_report); return;
  }
  // otherwise restore the last file if one exists
  if(lf && state.files.includes(lf)){
    await selectFile(lf,true);
    go(1);
  }else{
    go(0);
  }
}

function renderSteps(){

    const d=document.createElement("div");

    d.innerHTML=`<span class="n">${i<state.step?"\u2713":i+1}</span><span>${tr(k)}</span>`;
    if(i<state.step)d.style.cursor="pointer",d.onclick=()=>go(i);

}
function applyT(){
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-t]").forEach(e=>{const k=e.getAttribute("data-t");if((T[lang]||T.en)[k])e.textContent=(T[lang]||T.en)[k];});
  document.getElementById("cfgTitle").textContent=tr("settings");
  renderLang();
}
function go(step){state.step=step;renderSteps();render();}
function render(){
  const m=document.getElementById("main");
  document.body.classList.toggle("step-cols",state.step===1);
  if(state.step===0)return renderFile(m);
  if(state.step===1)return renderMap(m);
  if(state.step===2)return renderSet(m);
  if(state.step===3)return renderSummary(m);
}

async function saveSession(){
  try{await fetch("/api/session",{method:"POST",headers:{'Content-Type':'application/json'},
    body:JSON.stringify({file:state.file,hasHeader:state.hasHeaderRow,mapping:state.mapping,
      settings:state.settings,scope:state.scope,limit:state.limit})});}catch(e){}
}

/* ---------- step 0: file ---------- */
function renderFile(m){
  m.innerHTML="";
  const wrap=document.createElement("div");wrap.className="filewrap";m.appendChild(wrap);
  wrap.innerHTML=`<div style="text-align:center"><h1>${tr("title_file")}</h1><p class="lead">${tr("lead_file")}</p></div>`;
  // large dropzone - the main element
  const drop=document.createElement("div");
  drop.className="dropbig";drop.id="drop";
  drop.innerHTML=`${UP_ICON}<div class="dropbig__title">${tr("drop_title")}</div>`
    +`<div class="dropbig__hint">${tr("drop_hint")}</div>`
    +`<input id="fileinput" type="file" accept=".csv,.tsv,.txt,.xlsx,.xlsm" style="display:none">`;
  wrap.appendChild(drop);
  // notice about openpyxl being required for the selected .xlsx
  if(state.xlsxNeeded){
    const box=document.createElement("div");box.className="xlsxbox";box.id="xlsxbox";
    box.innerHTML=`<div class="t">${tr("xlsx_need")}</div>`
      +(state.allowPip
         ?`<button class="btn" style="padding:.5rem .9rem" onclick="installXlsx()">${tr("xlsx_install")}</button>`
         :"");
    wrap.appendChild(box);
  }
  // history of files in the input folder
  if(state.files.length){
    const card=document.createElement("div");card.className="card";card.style.marginTop="1rem";
    const lf=state.session.last_file;
    let html=`<div class="histhead">${tr("pick")}</div>`;
    state.files.forEach(f=>{
      const isLast=f===lf?`<span class="last">${tr("last_used")}</span>`:"";
      html+=`<div class="fileitem ${state.file===f?'sel':''}" onclick="selectFile('${f.replace(/'/g,"\\'")}')">`
        +`${FILE_ICON}<span class="fname">${esc(f)}</span>${isLast}<span class="chev">\u203A</span></div>`;});
    card.innerHTML=html;wrap.appendChild(card);
  }
  const fa=document.createElement("div");fa.className="footer-actions";fa.style.justifyContent="center";
  fa.innerHTML=`<button class="btn" ${state.file?"":"disabled"} onclick="go(1)">${tr("next")}</button>`;
  wrap.appendChild(fa);

  const inp=document.getElementById("fileinput");
  drop.onclick=()=>inp.click();
  inp.onchange=()=>inp.files[0]&&uploadFile(inp.files[0]);
  drop.ondragover=e=>{e.preventDefault();drop.classList.add("over");};
  drop.ondragleave=()=>drop.classList.remove("over");
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove("over");if(e.dataTransfer.files[0])uploadFile(e.dataTransfer.files[0]);};
}
async function uploadFile(f){
  const drop=document.getElementById("drop");
  if(drop){drop.classList.add("is-uploading");
    drop.innerHTML=`<div class="spinner"></div><div class="dropbig__title">${tr("uploading")}</div>`
      +`<div class="dropbig__hint">${esc(f.name)}</div>`;}
  try{
    const r=await fetch("/api/upload?name="+encodeURIComponent(f.name),{method:"POST",body:f});
    const j=await r.json().catch(()=>({}));
    if(j&&j.ok===false){toast(j.error||"upload failed");render();return;}
    const d=await api("/api/init");state.files=d.files;await selectFile(f.name);
  }catch(e){toast("upload failed");render();}
}
async function installXlsx(){
  const box=document.getElementById("xlsxbox");
  if(box)box.innerHTML=`<div class="spinner" style="width:22px;height:22px;margin:0"></div><div class="t">${tr("xlsx_installing")}</div>`;
  try{
    const r=await api("/api/install-xlsx",{method:"POST"});
    if(r&&r.ok){toast(tr("xlsx_done"));const f=state.xlsxNeeded;state.xlsxNeeded=null;if(f){await selectFile(f);}else{render();}}
    else{toast(tr("xlsx_fail"));render();}
  }catch(e){toast(tr("xlsx_fail"));render();}
}
function setupGlobalDrop(){
  if(window._dropWired)return;
  window._dropWired=true;
  let depth=0;
  const isFile=e=>e.dataTransfer&&Array.from(e.dataTransfer.types||[]).indexOf("Files")>=0;
  const show=()=>{const d=document.getElementById("drop");if(d)d.classList.add("over");};
  const hide=()=>{depth=0;const d=document.getElementById("drop");if(d)d.classList.remove("over");};
  window.addEventListener("dragenter",e=>{if(state.step!==0||!isFile(e))return;e.preventDefault();depth++;show();});
  window.addEventListener("dragover",e=>{if(state.step===0&&isFile(e))e.preventDefault();});
  window.addEventListener("dragleave",e=>{if(state.step!==0)return;depth--;if(depth<=0)hide();});
  window.addEventListener("drop",e=>{if(state.step!==0)return;e.preventDefault();hide();const f=e.dataTransfer.files&&e.dataTransfer.files[0];if(f)uploadFile(f);});
}
async function selectFile(f,restore){
  state.file=f;
  const saved=(state.session.files||{})[f];
  const hh=(restore&&saved)?saved.hasHeader:undefined;
  const body={file:f}; if(hh!==undefined)body.hasHeader=hh;
  const d=await api("/api/preview",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!d.ok){
    if(d.error_code==="xlsx_missing"){state.xlsxNeeded=f;state.file=null;render();return;}
    toast(d.error||"error");return;
  }
  state.xlsxNeeded=null;
  state.header=d.header;state.rows=d.rows;state.total=d.total;state.encoding=d.encoding;state.hasHeaderRow=d.hasHeaderRow;
  state.suggested_settings=d.suggested_settings||{};
  if(restore&&saved&&saved.mapping&&saved.mapping.length){
    state.mapping=saved.mapping; state.settings=saved.settings||{}; state.scope=saved.scope||"manual"; state.limit=saved.limit||null;
    toast(tr("restored"));
  }else{
    state.mapping=d.suggestion; state.settings={};
  }
  await saveSession();
  render();
}

/* ---------- step 1: columns ---------- */
function svcById(id){return state.services.find(s=>s.service===id);}
function fieldLabel(mp){const s=svcById(mp.service);if(!s)return '';const f=s.fields.find(f=>f.field===mp.field);return f?f.label:'';}
function colorMap(){const m={};let n=0;state.mapping.forEach(mp=>{if(mp.service&&mp.field){const k=mp.service+'|'+(mp.group||1);if(!(k in m))m[k]=PALETTE[n++%PALETTE.length];}});return m;}
function maxGroup(service){let mx=1;state.mapping.forEach(mp=>{if(mp.service===service)mx=Math.max(mx,mp.group||1);});return mx;}

function renderMap(m){
  // keep the table's horizontal scroll across re-render (selecting/removing a column)
  const _keepScroll=(_sheetWrap&&_sheetWrap.scrollLeft)||0;
  m.innerHTML=`<h1>${tr("title_map")}</h1><p class="lead">${tr("lead_map")}</p>`;
  const filter=document.createElement("div");filter.className="filter";
  filter.innerHTML=`<div class="filter__left">
      <div class="filter__mark"><strong>${esc(state.file||"")}</strong></div>
      <div class="filter__sum">${tr("total_rows")} <mark>${state.total} ${tr("rows")}</mark></div>
    </div>`;
  m.appendChild(filter);

  const cmap=colorMap();
  const noHdr=state.hasHeaderRow===false;
  // Without a header, the first physical row is normal DATA (not a name). It shows at the top
  // in data style (not bold) and the rest of the rows shift down; with a header, the bold name is on top.
  const dataRows=noHdr?state.rows.slice(1):state.rows;
  const nrows=Math.min(dataRows.length,8);
  const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const box=document.createElement("div");box.className="sheetbox";
  const wrap=document.createElement("div");wrap.className="sheetwrap";
  const sheet=document.createElement("div");sheet.className="sheet";

  // left gutter: fox + first-row toggle + row numbers
  let g=`<div class="gut"><div class="chiprow"><img src="${FOX}" alt="" onerror="this.style.display='none'"><span>${tr("pair_with")}</span></div>`;
  g+=`<div class="letter"></div>`;
  g+=`<div class="rowh cellhdr"><label class="firstrow"><input type="checkbox" ${state.hasHeaderRow!==false?'checked':''} onchange="toggleHeader(this.checked)"> ${tr("first_row_header")}</label></div>`;
  for(let r=0;r<nrows;r++)g+=`<div class="rowh">${String(r+2).padStart(2,'0')}</div>`;
  g+=`<div class="grouprow"></div></div>`;
  sheet.innerHTML=g;

  // one card per column
  state.mapping.forEach((mp,i)=>{
    const mapped=mp.service&&mp.field;
    const color=mapped?cmap[mp.service+'|'+(mp.group||1)]:'';
    const col=document.createElement("div");
    col.className="col"+(mapped?" mapped":"");
    if(color)col.style.setProperty("--c",color);
    let h="";
    if(mapped){
      h+=`<div class="chiprow"><div class="chip" style="--c:${color}" onclick="openPicker(event,${i})"><img class="foxdot" src="${FOX}" alt="" onerror="this.style.display='none'"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(fieldLabel(mp))}</span><button class="x" title="${tr('none')}" onclick="event.stopPropagation();clearCol(${i})">\u2715</button></div></div>`;
    }else{
      h+=`<div class="chiprow"><div class="chip empty" onclick="openPicker(event,${i})">${tr("choose_service")}</div></div>`;
    }
    h+=`<div class="letter">${letters[i]||(i+1)}</div>`;
    const _ci=state.header.indexOf(mp.column);
    if(noHdr){
      const v0=state.rows[0]?state.rows[0][_ci]:'';
      h+=`<div class="rowh celldata${v0?'':' empty'}" title="${esc(v0||'')}">${v0?esc(v0):tr("empty_cell")}</div>`;
    }else{
      h+=`<div class="rowh cellhdr" title="${esc(mp.column)}">${esc(mp.column)}</div>`;
    }
    for(let r=0;r<nrows;r++){
      const v=dataRows[r]?dataRows[r][_ci]:'';
      h+=`<div class="rowh celldata${v?'':' empty'}">${v?esc(v):tr("empty_cell")}</div>`;
    }
    if(mapped&&svcById(mp.service).grouped){
      const mx=maxGroup(mp.service)+1, sname=svcById(mp.service).name;
      h+=`<div class="grouprow"><select class="gsel" style="--c:${color}" onchange="setGroup(${i},this.value)">`;
      for(let gg=1;gg<=mx;gg++)h+=`<option value="${gg}" ${(mp.group||1)==gg?'selected':''}>${esc(sname)} ${gg}</option>`;
      h+=`</select></div>`;
    }else{h+=`<div class="grouprow"></div>`;}
    col.innerHTML=h;sheet.appendChild(col);
  });

  wrap.appendChild(sheet);
  const panel=document.createElement("div");panel.className="sheetpanel";panel.appendChild(wrap);
  box.innerHTML=`<button class="sheetarrow sheetarrow--l" onclick="slideSheet(-1)">\u2190</button><button class="sheetarrow sheetarrow--r" onclick="slideSheet(1)">\u2192</button>`;
  box.insertBefore(panel,box.firstChild);
  m.appendChild(box);

  const fa=document.createElement("div");fa.className="footer-actions";
  fa.innerHTML=`<button class="btn--ghost" onclick="go(0)">${tr("back")}</button><button class="btn" onclick="toSettings()">${tr("next")}</button>`;
  m.appendChild(fa);

  enableDragScroll(wrap);
  if(_keepScroll){wrap.scrollLeft=_keepScroll;updateArrows();}
}
let _sheetWrap=null;
function enableDragScroll(wrap){
  _sheetWrap=wrap;
  let down=false,sx=0,sl=0,moved=false;
  wrap.addEventListener("mousedown",e=>{if(e.target.closest("select,button,.chip,input,label,option"))return;down=true;moved=false;sx=e.pageX;sl=wrap.scrollLeft;wrap.classList.add("drag");});
  window.addEventListener("mouseup",()=>{down=false;wrap.classList.remove("drag");});
  window.addEventListener("mousemove",e=>{if(!down)return;const d=e.pageX-sx;if(Math.abs(d)>3)moved=true;wrap.scrollLeft=sl-d;updateArrows();});
  // suppress the click after dragging
  wrap.addEventListener("click",e=>{if(moved){e.preventDefault();e.stopPropagation();moved=false;}},true);
  wrap.addEventListener("scroll",updateArrows);
  requestAnimationFrame(updateArrows);
}
function slideSheet(dir){if(!_sheetWrap)return;_sheetWrap.scrollBy({left:dir*440,behavior:"smooth"});setTimeout(updateArrows,350);}
function updateArrows(){
  const w=_sheetWrap;if(!w)return;
  const l=document.querySelector(".sheetarrow--l"),r=document.querySelector(".sheetarrow--r");
  if(!l||!r)return;
  const max=w.scrollWidth-w.clientWidth-2;
  l.disabled=w.scrollLeft<=2; r.disabled=w.scrollLeft>=max;
  const hide=max<=2; l.style.display=hide?"none":""; r.style.display=hide?"none":"";
}
function clearCol(i){const mp=state.mapping[i];mp.service=null;mp.field=null;mp.group=1;mp.reasoning="";closePicker();renderMap(document.getElementById("main"));}
function setGroup(i,v){state.mapping[i].group=parseInt(v,10);renderMap(document.getElementById("main"));}
function toggleHeader(checked){state.hasHeaderRow=checked;reloadPreview();}
async function reloadPreview(){
  const prev=state.mapping;
  const d=await api("/api/preview",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({file:state.file,hasHeader:state.hasHeaderRow})});
  if(!d.ok){toast(d.error||"error");return;}
  state.header=d.header;state.rows=d.rows;state.total=d.total;
  // Toggling "first row is a header" changes neither the count nor the order of columns, only what gets validated.
  // Keep the user's mapping by column position; only refresh the column label from the new header.
  if(prev&&prev.length===d.suggestion.length){
    state.mapping=d.suggestion.map((sug,i)=>{const o=prev[i];return {...sug,service:o.service,field:o.field,group:o.group,reasoning:o.reasoning};});
  }else{
    state.mapping=d.suggestion;
  }
  renderMap(document.getElementById("main"));
}
let _picker=null;
function closePicker(){if(_picker){_picker.remove();_picker=null;document.removeEventListener("click",_pickerOutside,true);}}
function _pickerOutside(e){if(_picker&&!_picker.contains(e.target))closePicker();}
function openPicker(e,i){
  e.stopPropagation();closePicker();
  const mp=state.mapping[i];
  const p=document.createElement("div");p.className="picker";
  let h=`<div class="opt" onclick="pick(${i},'','')">${tr("none")}</div>`;
  // candidates present in the schema -> used only to REORDER (no special section):
  // the most relevant service section comes first, and within it the suggested
  // field(s) bubble to the top by score; everything else keeps its original order.
  const cand=(mp.candidates||[]).filter(c=>{const s=svcById(c.service);return s&&s.fields.some(f=>f.field===c.field);});
  const svcScore={}, fieldScore={};
  cand.forEach(c=>{
    const fk=c.service+'|'+c.field, sc=c.score||0;
    if(fieldScore[fk]===undefined||sc>fieldScore[fk])fieldScore[fk]=sc;
    if(svcScore[c.service]===undefined||sc>svcScore[c.service])svcScore[c.service]=sc;
  });
  const services=state.services.map((s,idx)=>({s,idx})).sort((a,b)=>{
    const sa=(a.s.service in svcScore)?svcScore[a.s.service]:-Infinity;
    const sb=(b.s.service in svcScore)?svcScore[b.s.service]:-Infinity;
    return sb!==sa ? sb-sa : a.idx-b.idx;
  }).map(o=>o.s);
  services.forEach(s=>{
    h+=`<div><span class="grp">${esc(s.name)}</span></div>`;
    const fields=s.fields.map((f,idx)=>({f,idx})).sort((a,b)=>{
      const fa=fieldScore[s.service+'|'+a.f.field], fb=fieldScore[s.service+'|'+b.f.field];
      const ha=fa!==undefined, hb=fb!==undefined;
      if(ha!==hb)return ha?-1:1;
      if(ha&&fa!==fb)return fb-fa;
      return a.idx-b.idx;
    }).map(o=>o.f);
    fields.forEach(f=>{const sel=(mp.service===s.service&&mp.field===f.field);
      const ex=f.example?`<span class="opt-ex">${tr("ex_label")}: ${esc(f.example)}</span>`:'';
      const ds=f.desc?`<span class="opt-desc">${esc(f.desc)}</span>`:'';
      h+=`<div class="opt" style="${sel?'background:var(--blue-l);font-weight:700':''}" onclick="pick(${i},'${s.service}','${f.field}')"><span>${esc(f.label)}</span>${ex}${ds}</div>`;});
  });
  p.innerHTML=h;document.body.appendChild(p);
  const r=e.currentTarget.getBoundingClientRect();
  p.style.left=Math.max(8,Math.min(r.left,window.innerWidth-240))+"px";
  p.style.top=(r.bottom+window.scrollY+5)+"px";
  _picker=p;setTimeout(()=>document.addEventListener("click",_pickerOutside,true),0);
}
function pick(i,svc,field){const mp=state.mapping[i];mp.service=svc||null;mp.field=field||null;if(svc)mp.group=mp.group||1;mp.reasoning="";closePicker();renderMap(document.getElementById("main"));}

function toSettings(){
  const mapped=state.mapping.filter(m=>m.service&&m.field);
  if(!mapped.length){toast(tr("no_map"));return;}
  const used=[...new Set(mapped.map(m=>m.service))];
  used.forEach(sv=>{if(!state.settings[sv]){state.settings[sv]={};
    (svcById(sv).settings||[]).forEach(st=>state.settings[sv][st.id]=Array.isArray(st.default)?st.default.slice():st.default);
    const sug=(state.suggested_settings||{})[sv]; if(sug)Object.keys(sug).forEach(k=>state.settings[sv][k]=Array.isArray(sug[k])?sug[k].slice():sug[k]);}});
  saveSession();
  go(2);
}

/* ---------- step 2: settings ---------- */
var SEC_ICON={
  location:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.6 7-12a7 7 0 1 0-14 0c0 5.4 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>',
  company:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><path d="M8 7h2M8 11h2M8 15h2M14 7h2M14 11h2M14 15h2"/></svg>',
  email:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 7l8.5 6 8.5-6"/></svg>',
  phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h3.5l1.8 4.5-2.2 1.3a12 12 0 0 0 5.1 5.1l1.3-2.2L19 15.5V19a2 2 0 0 1-2 2A15 15 0 0 1 3 5a2 2 0 0 1 2-2z"/></svg>',
  name:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M4.5 20c.6-3.8 4-6 7.5-6s6.9 2.2 7.5 6"/></svg>'
};
function renderSet(m){
  m.innerHTML=`<h1>${tr("title_set")}</h1><p class="lead">${tr("lead_set")}</p>`;
  const used=[...new Set(state.mapping.filter(m=>m.service&&m.field).map(m=>m.service))];
  const wrap=document.createElement("div");let h="";
  used.forEach(sv=>{const s=svcById(sv);
    const tail=s.warn
      ?`<span class="sec-warn"><strong>\u26A0</strong> ${esc(s.warn)}</span>`
      :(s.countries?`<span class="sec-pill">${esc(s.countries)}</span>`:'');
    h+=`<div class="sec"><div class="sec-head"><span class="sec-icon">${SEC_ICON[sv]||''}</span><span class="sec-title">${esc(s.name)}</span>${tail}</div>`;
    h+=`<div class="sets">`;
    (s.settings||[]).forEach(st=>{h+=renderSetting(sv,st);});
    h+=`</div></div>`;
  });
  wrap.innerHTML=h;m.appendChild(wrap);
  const fa=document.createElement("div");fa.className="footer-actions";
  fa.innerHTML=`<button class="btn--ghost" onclick="go(1)">${tr("back")}</button><button class="btn" onclick="saveSession();go(3)">${tr("next")}</button>`;
  m.appendChild(fa);
}
function renderSetting(sv,st){
  const cur=state.settings[sv][st.id];
  const hint=st.desc?`<div class="set-hint">${esc(st.desc)}</div>`:'';
  const lbl=`<div class="set-l"><div class="set-name">${esc(st.label)}</div>${hint}</div>`;
  if(st.type==='select'){
    const opts=(st.options||[]).map(o=>`<option value="${esc(o.value)}" ${o.value===cur?'selected':''}>${esc(o.label)}</option>`).join('');
    return `<div class="set">${lbl}<div class="set-c"><select class="set-select" onchange="setSetting('${sv}','${st.id}',this.value)">${opts}</select></div></div>`;
  }
  if(st.type==='order'){
    return `<div class="set set--block">${lbl}<div class="orderlist" id="ord-${sv}-${st.id}">${renderOrder(sv,st)}</div></div>`;
  }
  const on=cur?'checked':'';
  return `<div class="set">${lbl}<div class="set-c"><span class="switch"><input type="checkbox" ${on} onchange="setSetting('${sv}','${st.id}',this.checked)"><span class="h"></span></span></div></div>`;
}
function _ordLabel(st,v){const o=(st.options||[]).find(o=>o.value===v);return o?o.label:v;}
function renderOrder(sv,st){
  const arr=state.settings[sv][st.id]||st.default||[];
  return arr.map((v,idx)=>`<div class="ord-item"><span class="ord-rank">${idx+1}</span><span class="ord-name">${esc(_ordLabel(st,v))}</span><span class="ord-btns"><button ${idx===0?'disabled':''} onclick="moveOrder('${sv}','${st.id}',${idx},-1)" title="nahoru">\u25B2</button><button ${idx===arr.length-1?'disabled':''} onclick="moveOrder('${sv}','${st.id}',${idx},1)" title="dolů">\u25BC</button></span></div>`).join('');
}
function setSetting(sv,id,val){state.settings[sv][id]=val;saveSession();}
function moveOrder(sv,id,idx,dir){
  const arr=(state.settings[sv][id]||[]).slice();const j=idx+dir;
  if(j<0||j>=arr.length)return;
  const t=arr[idx];arr[idx]=arr[j];arr[j]=t;state.settings[sv][id]=arr;saveSession();
  const el=document.getElementById('ord-'+sv+'-'+id);
  if(el){const st=(svcById(sv).settings||[]).find(s=>s.id===id);el.innerHTML=renderOrder(sv,st);}
}

/* ---------- step 3: summary & order ---------- */
function mappedPayload(){return state.mapping.filter(m=>m.service&&m.field);}
function fmtMoney(n,sym){return (Number(n)||0).toLocaleString('cs-CZ',{minimumFractionDigits:2,maximumFractionDigits:2}).replace(/\u00A0/g,' ')+' '+(sym||'Kč');}
function renderSummary(m){
  m.innerHTML=`<h1>${tr("title_sum")}</h1><p class="lead">${tr("lead_sum")}</p>`;
  const g=document.createElement("div");g.className="grid2";
  // left: scope + key + unit price
  const left=document.createElement("div");left.className="card sumleft";
  left.innerHTML=`
    <div class="seclbl seclbl--active">1 \u00B7 ${tr("api_key")}<span class="infodot" tabindex="0" aria-label="${tr("key_help_aria")}">i<span class="tip">${tr("key_help")}</span></span></div>
    <div class="field">
      ${state.has_key?`
      <div id="keysaved" style="display:flex;align-items:center;gap:.6rem">
        <span style="flex:1;color:var(--ink)">${tr("api_key_saved")} <span class="keymask">\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2009${esc(state.key_hint||"")}</span></span>
        <button class="btn--ghost" style="padding:.55rem .9rem" onclick="changeKey()">${tr("api_key_change")}</button>
      </div>
      <div id="keyedit" style="display:none;gap:.5rem;margin-top:.5rem">
        <input id="sum_key" type="text" class="maskinput" placeholder="${tr('api_key_ph')}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" name="fx_token_${Date.now()}" data-lpignore="true" data-1p-ignore data-bwignore data-form-type="other" style="flex:1">
        <button class="btn--ghost" style="padding:.55rem .9rem" onclick="saveKey()">${tr("api_key_save")}</button>
      </div>`:`
      <div style="display:flex;gap:.5rem">
        <input id="sum_key" type="text" class="maskinput" placeholder="${tr('api_key_ph')}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" name="fx_token_${Date.now()}" data-lpignore="true" data-1p-ignore data-bwignore data-form-type="other" style="flex:1">
        <button class="btn--ghost" style="padding:.55rem .9rem" onclick="saveKey()">${tr("api_key_save")}</button>
      </div>`}
    </div>
    <div class="cardsep"></div>
    <div class="step2${state.has_key?'':' locked'}" ${state.has_key?'':'aria-disabled="true"'}>
    <div class="seclbl${state.has_key?' seclbl--active':''}">2 \u00B7 ${tr("scope_head")}</div>
    <div class="scope">
      <label class="${state.scope==='manual'?'sel':''}"><input type="radio" name="scope" ${state.scope==='manual'?'checked':''} onchange="setScope('manual')">${tr("scope_manual")} \u2014 <input id="scopeLimit" type="number" min="1" max="${state.total}" value="${Math.min(state.limit||state.test_sample,state.total)}" onclick="event.stopPropagation();setScope('manual')" onchange="setLimit(this.value)" style="width:90px;margin:0 .3rem;font:inherit"> ${tr("scope_rows_unit")}</label>
      <label class="${state.scope==='full'?'sel':''}"><input type="radio" name="scope" ${state.scope==='full'?'checked':''} onchange="setScope('full')">${tr("scope_full")} \u2014 ${tr("scope_all",{n:state.total})}</label>
    </div>
    <div class="logbar">
      <label><input type="checkbox" ${state.logRun?'checked':''} onchange="state.logRun=this.checked"> ${tr("log_run")}</label>
      <span class="hint">${tr("log_run_hint")}</span>
    </div>
    </div>`;
  g.appendChild(left);
  // right: sum panel
  const right=document.createElement("div");
  right.innerHTML=`<div class="sum" id="sumpanel"><div class="sum__head">${tr("sum_head")}</div><div class="small muted">\u2026</div></div>`;
  g.appendChild(right);
  m.appendChild(g);


  const fa=document.createElement("div");fa.className="footer-actions";
  fa.innerHTML=`<button class="btn--ghost" onclick="go(2)">${tr("back")}</button><button class="btn btn--start" id="runbtn" onclick="startRun()"><span class="play">\u25B6</span>${tr("run_btn")}</button>`;
  m.appendChild(fa);
  loadEstimate();
}
async function changeKey(){
  const ks=document.getElementById("keysaved"), ke=document.getElementById("keyedit");
  if(ks)ks.style.display="none";
  if(ke){ke.style.display="flex";const i=document.getElementById("sum_key");if(i)i.focus();}
}
async function saveKey(){
  const v=document.getElementById("sum_key").value.trim();
  if(!v)return;
  await fetch("/api/config",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({FOXENTRY_API_KEY:v})});
  state.has_key=true; state.key_hint=v.length>8?v.slice(-4):""; toast(tr("key_saved"));
  render();  // re-render the summary into the "key saved" state
}
function sumRowsTxt(){
  return state.scope==='full'
    ? tr("scope_all",{n:state.total})
    : tr("scope_first",{n:Math.min(state.limit||state.test_sample,state.total)});
}
function sumSkeleton(loading){
  const box=document.getElementById("sumpanel");if(!box)return;
  const note=loading
    ? `<div class="small muted" style="margin-top:.9rem">${tr("sum_calc")}</div>`
    : "";
  box.innerHTML=`<div class="sum__head">${tr("sum_head")}</div>
    <table class="sum-skel">
      <tr><td>${tr("rows_label")}</td><td>${sumRowsTxt()}</td></tr>
      <tr><td>${tr("calls")}</td><td class="ph">\u2014</td></tr>
      <tr><td>${tr("credits_left")}</td><td class="ph">\u2014</td></tr>
      <tr><td>${tr("rate")}</td><td class="ph">\u2014</td></tr>
      <tr><td>${tr("eta")}</td><td class="ph">\u2014</td></tr>
      <tr class="divider"><td colspan="2"><hr></td></tr>
      <tr class="total"><td>${tr("price_total")}</td><td class="ph">\u2014</td></tr>
    </table>${note}`;
}
async function loadEstimate(){
  const box=document.getElementById("sumpanel");if(!box)return;
  if(!state.has_key){sumSkeleton(false);updateRunBtn();return;}
  await syncCurrency();
  // Show the skeleton only the first time. On recompute (range change) leave the panel unchanged in
  // height and just dim it slightly so the box does not jump.
  if(!state.estimate){sumSkeleton(true);}else{box.style.opacity=".55";}
  const d=await api("/api/estimate",{method:"POST",headers:{'Content-Type':'application/json'},
    body:JSON.stringify({file:state.file,mapping:mappedPayload(),settings:state.settings,scope:state.scope,limit:state.limit,hasHeader:state.hasHeaderRow})});
  box.style.opacity="";
  if(!d.ok){box.innerHTML=`<div class="sum__head">${tr("sum_head")}</div><div class="errbox">${esc(d.error||"error")}</div>`;state.canRun=false;updateRunBtn();return;}
  state.estimate=d; state.canRun=true;
  const sym=d.price_symbol||"Kč";
  const complete=(d.remaining>0 && d.remaining>=d.total);
  let resume="";
  if(complete){
    resume=`<div class="donebox"><span class="dot"></span>${tr("alldone")}</div>`;
    state.canRun=false;
  }else if(d.remaining>0){
    resume=`<div class="okbox">${tr("resume",{n:d.remaining+1})}</div>`;
  }
  let conn="";
  let warn=(d.connected!==false&&d.credits_left!=null&&d.calls>d.credits_left)?`<div class="warnbox">${tr("warn_credits")}</div>`:"";
  let breakdown="";
  (d.price_items||[]).forEach(it=>{
    let detail;
    if(it.enrich){
      detail=`${tr("price_validation")}: ${it.calls} \u00D7 ${it.unit_base} ${sym}<br>+ ${tr("price_enrich")}: ${it.calls} \u00D7 ${it.unit_enrich} ${sym}`;
    }else{
      detail=`${it.calls} \u00D7 ${it.unit} ${sym}`;
    }
    breakdown+=`<tr><td><span style="color:var(--ink);font-weight:600">${esc(it.label)}</span><small>${detail}</small></td><td>${fmtMoney(it.subtotal,sym)}</td></tr>`;
  });
  const rateTxt=(d.rate??"\u2014")+(d.rate_estimated?" ~":"");
  box.innerHTML=`<div class="sum__head">${tr("sum_head")}</div>${conn}${resume}
    <table>
      <tr><td>${tr("calls")}</td><td>${d.calls}${d.deduped>0?` <small style="color:var(--grey)">(${tr("dedup_from",{n:d.raw_calls})})</small>`:""}</td></tr>
      <tr><td>${tr("credits_left")}</td><td>${d.credits_left??"\u2014"}</td></tr>
      <tr><td>${tr("rate")}</td><td>${rateTxt}</td></tr>
      <tr><td>${tr("eta")}<small>${state.scope==='full'?tr("scope_full"):tr("scope_first",{n:Math.min(state.limit||state.total,state.total)})}</small></td><td>${esc(d.eta)}</td></tr>
      <tr class="divider"><td colspan="2"><hr></td></tr>
      <tr><td colspan="2" class="small muted">${tr("price_breakdown")}</td></tr>
      ${breakdown}
      <tr class="divider"><td colspan="2"><hr></td></tr>
      <tr class="total"><td>${tr("price_total")}</td><td>${fmtMoney(d.price||0,sym)}</td></tr>
    </table>${warn}`;
  updateRunBtn(complete);
}
async function setCurrency(v){
  state.currency=v;
  await fetch("/api/config",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({CURRENCY:v})});
  loadEstimate();
}
function setScope(v){
  state.scope=v;
  if(v==="manual"&&!state.limit){
    const inp=document.getElementById("scopeLimit");
    state.limit=(inp&&parseInt(inp.value,10))||Math.min(state.test_sample,state.total)||1;
  }
  saveSession();
  const labels=document.querySelectorAll(".scope label");
  const map={manual:0,full:1};
  labels.forEach((l,idx)=>l.classList.toggle("sel",idx===map[v]));
  loadEstimate();
}
function setLimit(v){
  let n=parseInt(v,10);
  if(isNaN(n)||n<1)n=1;
  if(state.total&&n>state.total)n=state.total;
  state.limit=n;
  const inp=document.getElementById("scopeLimit");if(inp&&String(n)!==inp.value)inp.value=n;
  if(state.scope!=="manual"){setScope("manual");}else{saveSession();loadEstimate();}
}
function fmtDur(s){s=Math.round(s||0);if(s<60)return s+" s";const m=Math.floor(s/60),r=s%60;return m+" min"+(r?(" "+r+" s"):"");}
function colorForResult(label){const n=(label||"").toLowerCase();
  if(/error|chyb/.test(n))return"#f85149";
  if(/inval|neplat/.test(n))return"#f0883e";
  if(/correct|oprav|n\u00e1vrh|navrh|suggest/.test(n))return"#58a6ff";
  if(/valid|platn/.test(n))return"#3fb950";
  return"#8588a1";}
function updateRunBtn(complete){
  const b=document.getElementById("runbtn");if(!b)return;
  if(complete){
    b.innerHTML=tr("revalidate");
    b.onclick=()=>revalidate(encodeURIComponent(state.file||""));
    b.classList.remove("btn--start");
    b.disabled=false;
  }else{
    b.innerHTML=`<span class="play">\u25B6</span>${tr("run_btn")}`;
    b.onclick=startRun;
    b.classList.add("btn--start");
    b.disabled=!state.has_key;
  }
}
async function startRun(){
  if(!state.has_key){toast(tr("api_key_missing"));return;}
  document.getElementById("runbtn").disabled=true;
  await saveSession();
  const d=await api("/api/run",{method:"POST",headers:{'Content-Type':'application/json'},
    body:JSON.stringify({file:state.file,mapping:mappedPayload(),settings:state.settings,scope:state.scope,limit:state.limit,hasHeader:state.hasHeaderRow,log:state.logRun})});
  if(!d.ok){toast(d.error||"error");document.getElementById("runbtn").disabled=false;return;}
  pollRun();
}
function pollRun(){
  const m=document.getElementById("main");
  m.innerHTML=`<h1>${tr("title_sum")}</h1>`;
  const c=document.createElement("div");c.className="card";c.id="runcard";m.appendChild(c);
  const t0=Date.now();
  let startDone=null;
  const tick=async()=>{
    const p=await api("/api/progress");
    const pct=p.total?Math.round(100*p.done/p.total):0;
    if(!p.finished){
      const now=Date.now();
      const elapsed=(now-t0)/1000;
      const done=p.done||0;
      if(startDone===null)startDone=done;
      const processed=done-startDone;
      const remaining=Math.max(0,(p.total||0)-done);
      // Stable estimate: average rate over the whole (current) session (not a sliding window),
      // rounded to whole minutes. For the first few seconds we show "…" (no rate yet).
      let etaTxt="\u2026";
      if(remaining===0){
        etaTxt="~1 min";
      }else if(elapsed>=5 && processed>=8){
        const rate=processed/elapsed;                 // rows/s, cumulative = steady
        const mins=Math.max(1,Math.round((remaining/rate)/60));
        etaTxt="~"+mins+" min";
      }
      const cur=Math.min(p.current||((p.done||0)+1),p.total||(p.done||0)+1);
      const banner=(p.resume_from>0)?`<div class="okbox">${tr("prog_resumed",{n:(p.resume_from)+1})}</div>`:"";
      document.getElementById("runcard").innerHTML=`<div style="font-weight:600">${tr("running")}</div>
        <div class="progress"><div style="width:${Math.max(pct,2)}%"></div></div>
        ${banner}
        <div class="runstats muted">
          <span><b>${p.done||0}</b> / ${p.total||0} ${tr("rows")} (${pct}%)</span>
          <span>${tr("prog_current")} <b>${cur}</b></span>
          <span>${tr("prog_validations")}: <b>${p.live_calls||p.calls||0}</b></span>
          <span>${tr("lbl_run_time")}: <b>${fmtDur(elapsed)}</b></span>
          <span>${tr("prog_eta")}: <b>${etaTxt}</b></span>
        </div>
        <div class="infobox">${tr("resume_note")}</div>`;
      setTimeout(tick,450);
    }else{
      if(!p.ok){document.getElementById("runcard").innerHTML=`<div class="errbox">${esc(p.message||"error")}</div>`;return;}
      renderReport(p);
    }
  };tick();
}

/* ---------- advanced config modal ---------- */
async function openConfig(){
  const c=await api("/api/config");state.config=c;
  document.getElementById("c_lang").value=c.LANGUAGE||"en";
  document.getElementById("c_country").value=c.DEFAULT_COUNTRY||"CZ";
  document.getElementById("c_sample").value=c.TEST_SAMPLE||"5";
  document.getElementById("c_timeout").value=c.TIMEOUT||"30";
  document.getElementById("c_inenc").value=c.INPUT_ENCODING||"auto";
  document.getElementById("c_outenc").value=c.OUTPUT_ENCODING||"utf-8-sig";
  document.getElementById("c_csv").checked=(c.CSV_INJECTION_GUARD||"off")==="on";
  // API key: leave the input empty (we do not prefill secrets), just show a hint of the saved one
  const ak=document.getElementById("c_apikey"); ak.value="";
  ak.placeholder=tr("c_apikey_ph");
  const hint=document.getElementById("c_apikey_hint");
  if(state.has_key){hint.innerHTML=`${tr("api_key_saved")} <span class="keymask">\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2009${esc(state.key_hint||"")}</span> — ${tr("c_apikey_replace")}`;}
  else{hint.textContent=tr("c_apikey_none");}
  applyT();
  document.getElementById("cfgModal").classList.add("open");
}
function closeConfig(){document.getElementById("cfgModal").classList.remove("open");}
const CM_NAMES={
 AD:["Andorra","Andorra"],AL:["Albania","Albánie"],AT:["Austria","Rakousko"],BA:["Bosnia & Herzegovina","Bosna a Hercegovina"],
 BE:["Belgium","Belgie"],BG:["Bulgaria","Bulharsko"],CH:["Switzerland","Švýcarsko"],CY:["Cyprus","Kypr"],
 CZ:["Czechia","Česko"],DE:["Germany","Německo"],DK:["Denmark","Dánsko"],ES:["Spain","Španělsko"],
 FR:["France","Francie"],GB:["United Kingdom","Spojené království"],GR:["Greece","Řecko"],HR:["Croatia","Chorvatsko"],
 HU:["Hungary","Maďarsko"],IS:["Iceland","Island"],IT:["Italy","Itálie"],LI:["Liechtenstein","Lichtenštejnsko"],
 LU:["Luxembourg","Lucembursko"],MC:["Monaco","Monako"],ME:["Montenegro","Černá Hora"],MK:["North Macedonia","Severní Makedonie"],
 MT:["Malta","Malta"],NL:["Netherlands","Nizozemsko"],PL:["Poland","Polsko"],RO:["Romania","Rumunsko"],
 RS:["Serbia","Srbsko"],SI:["Slovenia","Slovinsko"],SK:["Slovakia","Slovensko"],SM:["San Marino","San Marino"],
 VA:["Vatican City","Vatikán"],XK:["Kosovo","Kosovo"]};
const CM_LOC=["AD","AL","AT","BA","BE","BG","CH","CY","CZ","DE","DK","ES","FR","GB","GR","HR","HU","IS","IT","LI","LU","MC","ME","MK","MT","NL","PL","RO","RS","SI","SK","SM","VA","XK"];
const CM_ROWS=[
 {svc:"email",icon:"📧",ep:"/email/validate",ww:true},
 {svc:"phone",icon:"📞",ep:"/phone/validate",ww:true},
 {svc:"name",icon:"👤",ep:"/name/validate",codes:["CZ","SK"]},
 {svc:"location",icon:"📍",ep:"/location/validate",codes:CM_LOC},
 {svc:"company",icon:"🏢",ep:"/company/validate",codes:["CZ","SK","PL","HU"]}];
function cmFlag(cc){ return /^[A-Za-z]{2}$/.test(cc)?String.fromCodePoint(...[...cc.toUpperCase()].map(c=>0x1F1E6+c.charCodeAt(0)-65)):""; }
function cmName(cc){ const n=CM_NAMES[cc]; return n?(lang==="cs"?n[1]:n[0]):cc; }
function renderCountries(){
  const rows=CM_ROWS.map(r=>{
    const cov = r.ww
      ? `<span class="ww">🌍 ${esc(tr("cm_worldwide"))}</span>`
      : `<div class="cflags">`+r.codes.map(c=>`<span class="cchip"><span class="fl">${cmFlag(c)}</span> ${esc(cmName(c))} <span class="cc">${esc(c)}</span></span>`).join("")+`</div>`;
    const epTxt = r.ep + (r.codes?` · ${r.codes.length} ${tr("cm_countries")}`:"");
    return `<div class="cmrow"><div class="cmrow__h">${r.icon} ${esc(tr("cm_svc_"+r.svc))}<span class="ep">${esc(epTxt)}</span></div>${cov}</div>`;
  }).join("");
  document.getElementById("countriesBox").innerHTML=
    `<div class="cm-head"><h2>${esc(tr("cm_title"))}</h2><button class="cm-x" onclick="closeCountries()" aria-label="close">✕</button></div>`+
    `<div class="cm-intro">${esc(tr("cm_intro"))}</div>`+rows+
    `<div class="cm-foot">${esc(tr("cm_source"))} · <a href="https://foxentry.dev/v2.1/reference/supported-countries" target="_blank" rel="noopener">foxentry.dev</a></div>`;
}
function openCountries(){ renderCountries(); document.getElementById("countriesModal").classList.add("open"); }
function closeCountries(){ document.getElementById("countriesModal").classList.remove("open"); }
async function saveConfig(){
  const v={LANGUAGE:document.getElementById("c_lang").value,DEFAULT_COUNTRY:document.getElementById("c_country").value,
    TEST_SAMPLE:document.getElementById("c_sample").value,TIMEOUT:document.getElementById("c_timeout").value,
    INPUT_ENCODING:document.getElementById("c_inenc").value,OUTPUT_ENCODING:document.getElementById("c_outenc").value,
    CSV_INJECTION_GUARD:document.getElementById("c_csv").checked?"on":"off"};
  const ak=document.getElementById("c_apikey").value.trim();
  if(ak){v.FOXENTRY_API_KEY=ak;}   // only when the user entered a new one - otherwise the key is not overwritten
  await fetch("/api/config",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify(v)});
  closeConfig();toast(tr("saved"));
  const d=await api("/api/init");lang=d.lang;state.services=d.services;state.files=d.files;
  state.test_sample=d.test_sample;state.has_key=d.has_key;state.key_hint=d.key_hint;applyT();renderSteps();render();
}

function esc(x){return String(x==null?"":x).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
let toastTimer;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2200);}

init();
</script>
